<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<style>
  @page {
    size: A4;
    margin: 0;
  }
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 11pt;
    line-height: 1.5;
    color: #1a1a1a;
    padding: 2cm 2.5cm;
    width: 21cm;
    min-height: 29.7cm;
  }
  .absender {
    text-align: right;
    margin-bottom: 1.5cm;
    font-size: 10.5pt;
    line-height: 1.4;
  }
  .empfaenger {
    margin-bottom: 1cm;
    font-size: 11pt;
    line-height: 1.4;
  }
  .datum {
    margin-bottom: 1cm;
    font-size: 11pt;
  }
  .betreff {
    font-weight: bold;
    font-size: 11.5pt;
    margin-bottom: 0.8cm;
  }
  .anrede {
    margin-bottom: 0.5cm;
  }
  .inhalt p {
    margin-bottom: 0.4cm;
    text-align: justify;
    hyphens: none;
  }
  .gruss {
    margin-top: 0.8cm;
    line-height: 1.4;
  }
  .unterschrift {
    margin-top: 1.2cm;
  }
</style>
</head>
<body>
  <div class="absender">{{absender}}</div>
  <div class="empfaenger">{{empfaenger}}</div>
  <div class="datum">{{datum}}</div>
  <div class="betreff">{{betreff}}</div>
  <div class="inhalt">{{inhalt}}</div>
</body>
</html>
