<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600&display=swap');

  @page {
    size: A4;
    margin: 0;
  }
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    font-family: 'Source Sans 3', 'Source Sans Pro', Arial, sans-serif;
    font-size: 11pt;
    line-height: 1.5;
    color: #1a1a1a;
    padding: 25mm 25mm 20mm 25mm;
  }
  .absender {
    text-align: right;
    margin-bottom: 0.8cm;
    font-size: 10.5pt;
    line-height: 1.4;
  }
  .empfaenger {
    margin-bottom: 0.6cm;
    font-size: 11pt;
    line-height: 1.4;
  }
  .ortsdatum {
    text-align: right;
    margin-bottom: 0.6cm;
    font-size: 11pt;
  }
  .betreff {
    font-weight: 600;
    font-size: 11.5pt;
    margin-bottom: 0.5cm;
  }
  .anrede {
    margin-bottom: 0.4cm;
  }
  .absatz {
    margin-bottom: 0.3cm;
    text-align: justify;
    hyphens: none;
  }
  .gruss {
    margin-top: 0.5cm;
    line-height: 1.4;
  }
  .unterschrift {
    margin-top: 1.2cm;
  }
  .beilagen {
    margin-top: 1cm;
    font-size: 10.5pt;
    color: #333;
  }
</style>
</head>
<body>
  <div class="absender">{{absender}}</div>
  <div class="empfaenger">{{empfaenger}}</div>
  <div class="ortsdatum">{{ortsdatum}}</div>
  <div class="betreff">{{betreff}}</div>
  <div class="anrede">{{anrede}}</div>
  <div class="absatz">{{absatz_1}}</div>
  <div class="absatz">{{absatz_2}}</div>
  <div class="absatz">{{absatz_3}}</div>
  <div class="absatz">{{absatz_4}}</div>
  <div class="gruss">Freundliche Grüsse</div>
  <div class="unterschrift">{{sender_name}}</div>
  <div class="beilagen">Beilagen: Lebenslauf, Arbeitszeugnisse</div>
</body>
</html>
